name: Terraform Plan

# Runs on every PR targeting main. Plans all 5 layers sequentially against
# the dev environment using LocalStack Azure on the GitHub Actions runner.
# Posts per-tier plan + cost comments on the PR.
#
# ── OPTIONAL REPOSITORY SECRET ────────────────────────────────────────────────
#   INFRACOST_API_KEY       From https://www.infracost.io/docs/#2-get-api-key

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to plan against"
        required: false
        default: dev

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── L1 Core ──────────────────────────────────────────────────────────────
  core:
    name: Plan / core
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: core
      environment: dev
      working_directory: core
    secrets:
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}

  # ── L2 Data ───────────────────────────────────────────────────────────────
  data:
    name: Plan / data
    needs: core
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: data
      environment: dev
      working_directory: data
    secrets:
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}

  # ── L3 Compute ────────────────────────────────────────────────────────────
  compute:
    name: Plan / compute
    needs: data
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: compute
      environment: dev
      working_directory: compute
    secrets:
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}

  # ── L4 Workloads (optional) ───────────────────────────────────────────────
  # Remove this job if the product has no Terraform-managed workload layer.
  workloads:
    name: Plan / workloads
    needs: compute
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: workloads
      environment: dev
      working_directory: workloads
    secrets:
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}

  # ── L5 Edge (optional) ────────────────────────────────────────────────────
  # L4 and L5 are peer-optional off L3. Edge does not depend on workloads
  # in the general case. Change needs: to [workloads] only if your edge
  # layer references resource IDs created by the workloads layer.
  edge:
    name: Plan / edge
    needs: compute
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: edge
      environment: dev
      working_directory: edge
    secrets:
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
