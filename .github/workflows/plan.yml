name: Terraform Plan

# Runs on every PR targeting main. Plans all 5 layers sequentially against
# the dev environment. Posts per-tier plan + cost comments on the PR.
#
# No secrets required — OpenInfraQuote runs fully offline, no API key needed.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to plan against"
        required: false
        default: dev

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── L1 Core ──────────────────────────────────────────────────────────────
  core:
    name: Plan / core
    uses: ext-MarcPar/example-centralize-workflow/.github/workflows/reusable-az-terraform.yml@c8e8913d690a513fc04472c1e30c6fe48d1ffff4
    with:
      tier: core
      environment: dev
      working_directory: core
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_PLAN }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID_DEV }}

  # ── L2 Data ───────────────────────────────────────────────────────────────
  data:
    name: Plan / data
    needs: core
    uses: ext-MarcPar/example-centralize-workflow/.github/workflows/reusable-az-terraform.yml@c8e8913d690a513fc04472c1e30c6fe48d1ffff4
    with:
      tier: data
      environment: dev
      working_directory: data
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_PLAN }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID_DEV }}

  # ── L3 Compute ────────────────────────────────────────────────────────────
  compute:
    name: Plan / compute
    needs: data
    uses: ext-MarcPar/example-centralize-workflow/.github/workflows/reusable-az-terraform.yml@c8e8913d690a513fc04472c1e30c6fe48d1ffff4
    with:
      tier: compute
      environment: dev
      working_directory: compute
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_PLAN }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID_DEV }}

  # ── L4 Workloads (optional) ───────────────────────────────────────────────
  # Remove this job if the product has no Terraform-managed workload layer.
  workloads:
    name: Plan / workloads
    needs: compute
    uses: ext-MarcPar/example-centralize-workflow/.github/workflows/reusable-az-terraform.yml@c8e8913d690a513fc04472c1e30c6fe48d1ffff4
    with:
      tier: workloads
      environment: dev
      working_directory: workloads
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_PLAN }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID_DEV }}

  # ── L5 Edge (optional) ────────────────────────────────────────────────────
  # L4 and L5 are peer-optional off L3. Edge does not depend on workloads
  # in the general case. Change needs: to [workloads] only if your edge
  # layer references resource IDs created by the workloads layer.
  edge:
    name: Plan / edge
    needs: compute
    uses: ext-MarcPar/example-centralize-workflow/.github/workflows/reusable-az-terraform.yml@c8e8913d690a513fc04472c1e30c6fe48d1ffff4
    with:
      tier: edge
      environment: dev
      working_directory: edge
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_PLAN }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID_DEV }}
