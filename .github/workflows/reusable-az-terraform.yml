name: Reusable — Azure Terraform

# Called by plan.yml (on pull_request) and apply.yml (on push to main).
# The same workflow handles both phases; jobs use `if:` conditions to
# run only the appropriate steps for each trigger.
#
# ── REQUIRED GITHUB REPOSITORY VARIABLES ─────────────────────────────────────
#   BU_CODE                   2-char BU code (e.g. ct, on)
#   PRODUCT_NAME              product + instance suffix (e.g. example01)
#   AZURE_TENANT_ID           Entra ID tenant ID
#   AZURE_CLIENT_ID_PLAN      Reader SP client ID (PR plan runs)
#   TF_STATE_RESOURCE_GROUP   RG of the state storage account
#   TF_STATE_STORAGE_ACCOUNT  State storage account name
#   TF_STATE_CONTAINER        State blob container name
#
# ── REQUIRED GITHUB ENVIRONMENT VARIABLES (per environment) ──────────────────
#   AZURE_CLIENT_ID_APPLY     Apply SP client ID (Owner on product subscription)
#   AZURE_SUBSCRIPTION_ID     Product subscription ID
#
# ── REQUIRED SECRETS ─────────────────────────────────────────────────────────
#   INFRACOST_API_KEY          From https://www.infracost.io/docs/#2-get-api-key

on:
  workflow_call:
    inputs:
      tier:
        description: "Deployment tier: core | data | compute | workloads | edge"
        type: string
        required: true
      environment:
        description: "Target environment: dev | uat | prd"
        type: string
        required: true
      working_directory:
        description: "Terraform root directory for this tier."
        type: string
        required: true
      state_resource_group:
        description: "Resource group of the state storage account."
        type: string
        required: true
      state_storage_account:
        description: "Azure Storage Account name for Terraform state."
        type: string
        required: true
      state_container:
        description: "Blob container name for Terraform state."
        type: string
        required: true
      state_key:
        description: "Blob key (e.g. ct/example01/core/terraform.tfstate)."
        type: string
        required: true
      tf_version:
        description: "Terraform version."
        type: string
        required: false
        default: "1.11.4"
      run_security_checks:
        description: "Run tflint and Checkov."
        type: boolean
        required: false
        default: true
      run_cost_analysis:
        description: "Run Infracost on pull requests."
        type: boolean
        required: false
        default: true
    secrets:
      AZURE_CLIENT_ID:
        description: >
          Plan runs: pass vars.AZURE_CLIENT_ID_PLAN (Reader SP).
          Apply runs: pass vars.AZURE_CLIENT_ID_APPLY from the GitHub Environment.
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      INFRACOST_API_KEY:
        required: false

# Prevents concurrent runs on the same tier + environment from racing on the
# Azure blob state lock. cancel-in-progress: false queues the second run
# rather than cancelling it — safe for infrastructure changes.
concurrency:
  group: ${{ github.repository }}-${{ inputs.tier }}-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # VALIDATE — format check, lint, security scan
  # Runs on both PR and push-to-main. Fails fast before any Azure calls.
  # ────────────────────────────────────────────────────────────────────────────
  validate:
    name: Validate / ${{ inputs.tier }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54531c595e89e64e7c8d7e2fca24da5f5a7e  # v3.2.0
        with:
          terraform_version: ${{ inputs.tf_version }}

      - name: Terraform Format Check
        working-directory: ${{ inputs.working_directory }}
        run: terraform fmt -check -recursive -diff

      - name: Setup tflint
        if: inputs.run_security_checks
        uses: terraform-linters/setup-tflint@19a52fbac37dacb22a09518e4ef6ee234f2d4987  # v4.0.0

      - name: Run tflint
        if: inputs.run_security_checks
        working-directory: ${{ inputs.working_directory }}
        run: |
          tflint --init
          tflint --format compact

      - name: Run Checkov
        if: inputs.run_security_checks
        uses: bridgecrewio/checkov-action@7547bff18e3ef1f71b12bf425d23e5b22af17c8b  # v12
        with:
          directory: ${{ inputs.working_directory }}
          framework: terraform
          quiet: true
          soft_fail: false

  # ────────────────────────────────────────────────────────────────────────────
  # PLAN — terraform init + plan, upload artifacts
  # On PR:        plans against dev state using the Reader SP.
  # On push/main: plans against the target env using the Apply SP.
  # ────────────────────────────────────────────────────────────────────────────
  plan:
    name: Plan / ${{ inputs.tier }}
    needs: validate
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"
    outputs:
      plan_summary: ${{ steps.summary.outputs.summary }}
      has_changes: ${{ steps.summary.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54531c595e89e64e7c8d7e2fca24da5f5a7e  # v3.2.0
        with:
          terraform_version: ${{ inputs.tf_version }}

      - name: Terraform Init
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ inputs.state_resource_group }}" \
            -backend-config="storage_account_name=${{ inputs.state_storage_account }}" \
            -backend-config="container_name=${{ inputs.state_container }}" \
            -backend-config="key=${{ inputs.state_key }}"

      - name: Terraform Plan
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform plan \
            -no-color \
            -out=tfplan.binary \
            2>&1 | tee plan.txt
          # Generate human-readable and JSON forms for downstream jobs
          terraform show -no-color tfplan.binary > plan-readable.txt
          terraform show -json tfplan.binary > tfplan.json

      - name: Extract plan summary
        id: summary
        working-directory: ${{ inputs.working_directory }}
        shell: bash
        run: |
          SUMMARY=$(grep -E "^Plan:|^No changes\." plan.txt | head -1 || echo "Plan completed")
          echo "summary=${SUMMARY}" >> "$GITHUB_OUTPUT"
          if echo "$SUMMARY" | grep -q "No changes"; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload plan artifacts
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2d  # v4.5.0
        with:
          # Artifact name encodes tier + environment + SHA for cross-job reference.
          name: tfplan-${{ inputs.tier }}-${{ inputs.environment }}-${{ github.sha }}
          path: |
            ${{ inputs.working_directory }}/tfplan.binary
            ${{ inputs.working_directory }}/plan-readable.txt
            ${{ inputs.working_directory }}/tfplan.json
            ${{ inputs.working_directory }}/plan.txt
          retention-days: 7
          if-no-files-found: error

  # ────────────────────────────────────────────────────────────────────────────
  # COST ANALYSIS — Infracost diff (pull requests only)
  # ────────────────────────────────────────────────────────────────────────────
  cost-analysis:
    name: Cost / ${{ inputs.tier }}
    needs: plan
    if: >
      github.event_name == 'pull_request' &&
      inputs.run_cost_analysis == true &&
      needs.plan.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    outputs:
      cost_comment: ${{ steps.infracost.outputs.cost_comment }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Infracost
        uses: infracost/actions/setup@ba5b5fc24ad1a4ac3e0ab6b06b2edab2a52e7c62  # v3.0.1
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Download plan artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444306234780b10a6d93a55  # v4.1.8
        with:
          name: tfplan-${{ inputs.tier }}-${{ inputs.environment }}-${{ github.sha }}
          path: /tmp/tfplan

      - name: Run Infracost diff
        id: infracost
        shell: bash
        run: |
          infracost diff \
            --path=/tmp/tfplan/tfplan.json \
            --format=json \
            --out-file=/tmp/infracost.json

          # Generate GitHub-flavoured markdown for the PR comment
          infracost output \
            --path=/tmp/infracost.json \
            --format=github-comment \
            --out-file=/tmp/infracost-comment.md

          # Expose a one-liner summary as a job output
          MONTHLY=$(jq -r '.totalMonthlyCost // "N/A"' /tmp/infracost.json)
          DIFF=$(jq -r '.diffTotalMonthlyCost // "N/A"' /tmp/infracost.json)
          echo "cost_comment=Monthly ~\$${MONTHLY}/mo (diff \$${DIFF})" >> "$GITHUB_OUTPUT"

      - name: Upload cost report artifact
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2d  # v4.5.0
        with:
          name: infracost-${{ inputs.tier }}-${{ inputs.environment }}-${{ github.sha }}
          path: /tmp/infracost-comment.md
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # PR COMMENT — unified comment with plan summary + full plan + cost impact
  # Replaces previous comment for the same tier on each new push to the PR.
  # ────────────────────────────────────────────────────────────────────────────
  pr-comment:
    name: PR Comment / ${{ inputs.tier }}
    needs: [plan, cost-analysis]
    if: >
      always() &&
      github.event_name == 'pull_request' &&
      !cancelled() &&
      needs.plan.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Download plan artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444306234780b10a6d93a55  # v4.1.8
        with:
          name: tfplan-${{ inputs.tier }}-${{ inputs.environment }}-${{ github.sha }}
          path: /tmp/tfplan

      - name: Download cost artifact
        if: needs.cost-analysis.result == 'success'
        uses: actions/download-artifact@fa0a91b85d4f404e444306234780b10a6d93a55  # v4.1.8
        with:
          name: infracost-${{ inputs.tier }}-${{ inputs.environment }}-${{ github.sha }}
          path: /tmp/infracost
        continue-on-error: true

      - name: Build and post PR comment
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            const fs = require('fs');

            const planPath = '/tmp/tfplan/plan-readable.txt';
            const planText = fs.existsSync(planPath)
              ? fs.readFileSync(planPath, 'utf8')
              : '(plan output unavailable)';
            const truncatedPlan = planText.length > 40000
              ? planText.slice(0, 40000) + '\n\n_(output truncated — see workflow logs for full plan)_'
              : planText;

            const costPath = '/tmp/infracost/infracost-comment.md';
            const costText = fs.existsSync(costPath)
              ? fs.readFileSync(costPath, 'utf8')
              : null;

            const summary = `${{ needs.plan.outputs.plan_summary }}`;
            const TIER    = `${{ inputs.tier }}`;
            const ENV     = `${{ inputs.environment }}`;

            const sections = [
              `## Terraform Plan — \`${TIER}\` / \`${ENV}\``,
              '',
              '| | |',
              '|---|---|',
              `| **Tier** | \`${TIER}\` |`,
              `| **Environment** | \`${ENV}\` |`,
              `| **Summary** | ${summary} |`,
              `| **Commit** | \`${{ github.sha }}\` |`,
              '',
              '<details><summary>📋 Full Plan Output</summary>',
              '',
              '```hcl',
              truncatedPlan,
              '```',
              '</details>',
            ];

            if (costText) {
              sections.push('', '<details><summary>💰 Cost Impact (Infracost)</summary>', '');
              sections.push(costText);
              sections.push('</details>');
            }

            const body = sections.join('\n');
            const marker = `Terraform Plan — \`${TIER}\` / \`${ENV}\``;

            // Remove previous comment for this tier/env to keep the PR clean
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            for (const c of comments) {
              if (c.user?.type === 'Bot' && c.body?.includes(marker)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  # ────────────────────────────────────────────────────────────────────────────
  # APPLY — immutable apply using the plan artifact from this run
  #
  # Runs only on push to main. The GitHub Environment gate enforces required
  # reviewers — approvers see the PR plan comments before approving.
  #
  # The apply uses the exact binary plan file generated in the plan job above.
  # ────────────────────────────────────────────────────────────────────────────
  apply:
    name: Apply / ${{ inputs.tier }}
    needs: plan
    if: >
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.plan.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    environment: ${{ inputs.tier }}-${{ inputs.environment }}
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"
    outputs:
      apply_summary: ${{ steps.summary.outputs.summary }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54531c595e89e64e7c8d7e2fca24da5f5a7e  # v3.2.0
        with:
          terraform_version: ${{ inputs.tf_version }}

      - name: Download plan artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444306234780b10a6d93a55  # v4.1.8
        with:
          name: tfplan-${{ inputs.tier }}-${{ inputs.environment }}-${{ github.sha }}
          path: ${{ inputs.working_directory }}

      - name: Terraform Init
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ inputs.state_resource_group }}" \
            -backend-config="storage_account_name=${{ inputs.state_storage_account }}" \
            -backend-config="container_name=${{ inputs.state_container }}" \
            -backend-config="key=${{ inputs.state_key }}"

      - name: Terraform Apply (immutable — exact plan from plan job)
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform apply -no-color tfplan.binary 2>&1 | tee apply-output.txt

      - name: Extract apply summary
        id: summary
        shell: bash
        run: |
          SUMMARY=$(grep -E "^Apply complete!" ${{ inputs.working_directory }}/apply-output.txt | head -1 || echo "Apply completed")
          echo "summary=${SUMMARY}" >> "$GITHUB_OUTPUT"

  # ────────────────────────────────────────────────────────────────────────────
  # RELEASE — create a GitHub Release after a successful apply
  # Tags as pre-release for non-prd; full release for prd.
  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: Release / ${{ inputs.tier }}
    needs: apply
    if: >
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.apply.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Download plan artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444306234780b10a6d93a55  # v4.1.8
        with:
          name: tfplan-${{ inputs.tier }}-${{ inputs.environment }}-${{ github.sha }}
          path: /tmp/tfplan

      - name: Create GitHub Release
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            const fs = require('fs');

            const planText = fs.existsSync('/tmp/tfplan/plan.txt')
              ? fs.readFileSync('/tmp/tfplan/plan.txt', 'utf8')
              : '';
            const readableText = fs.existsSync('/tmp/tfplan/plan-readable.txt')
              ? fs.readFileSync('/tmp/tfplan/plan-readable.txt', 'utf8')
              : '';

            // Parse resource change counts
            const added    = (planText.match(/(\d+) to add/)     || ['','0'])[1];
            const changed  = (planText.match(/(\d+) to change/)  || ['','0'])[1];
            const destroyed = (planText.match(/(\d+) to destroy/) || ['','0'])[1];

            // Parse individual resource names from the readable plan
            const extractResources = (text, prefix) =>
              [...text.matchAll(new RegExp(`^\\s+${prefix} resource "(\\S+)" "(\\S+)"`, 'gm'))]
                .map(m => `\`${m[1]}.${m[2]}\``);

            const addedRes    = extractResources(readableText, '\\+');
            const changedRes  = extractResources(readableText, '~');
            const destroyedRes = extractResources(readableText, '-');

            const tier  = '${{ inputs.tier }}';
            const env   = '${{ inputs.environment }}';
            const sha   = '${{ github.sha }}';
            const runId = '${{ github.run_id }}';
            const date  = new Date().toISOString().slice(0, 10);

            const tagName = `${date}-${tier}-${env}-r${{ github.run_number }}`;

            const body = [
              `## Infrastructure Apply — \`${tier}\` / \`${env}\``,
              '',
              `| | |`,
              `|---|---|`,
              `| **Applied** | ${new Date().toISOString()} |`,
              `| **Commit** | [\`${sha.slice(0,8)}\`](${{ github.server_url }}/${{ github.repository }}/commit/${sha}) |`,
              `| **Run** | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${runId}) |`,
              '',
              '### Change Summary',
              '',
              '| Added | Changed | Destroyed |',
              '|-------|---------|-----------|',
              `| ${added} | ${changed} | ${destroyed} |`,
              '',
              ...(addedRes.length    ? ['**Added:**',    ...addedRes.map(r    => `- ${r}`), ''] : []),
              ...(changedRes.length  ? ['**Changed:**',  ...changedRes.map(r  => `- ${r}`), ''] : []),
              ...(destroyedRes.length ? ['**Destroyed:**', ...destroyedRes.map(r => `- ${r}`), ''] : []),
              '<details><summary>📋 Full Plan Output</summary>',
              '',
              '```',
              readableText.slice(0, 60000),
              '```',
              '</details>',
            ].join('\n');

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              name: `[${tagName}] ${env === 'prd' ? '🚀 Production' : '🧪 ' + env.toUpperCase()} — ${tier}`,
              body,
              draft: false,
              prerelease: env !== 'prd',
              target_commitish: sha,
            });
