name: Validate Workflows

# Runs on every PR that touches workflow or action files.
# This is a required status check — PRs cannot merge if it fails.
#
# To enforce as a required check:
#   Settings → Branches → main → Require status checks → add "Lint / actionlint"

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    name: Lint / actionlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install actionlint
        run: |
          VERSION="1.7.7"
          curl -sSfL \
            "https://github.com/rhysd/actionlint/releases/download/v${VERSION}/actionlint_${VERSION}_linux_amd64.tar.gz" \
            | tar xz actionlint
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Run actionlint
        run: actionlint -color
