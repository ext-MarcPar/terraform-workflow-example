name: Terraform Apply

# Runs on push to main (i.e., after a PR is merged). Applies all 5 layers
# sequentially through dev → uat → prd, gating each environment with
# GitHub Environment required reviewers.
#
# ── GITHUB ENVIRONMENTS REQUIRED ─────────────────────────────────────────────
# Create these environments in repo Settings → Environments:
#
#   core-dev / data-dev / compute-dev / workloads-dev / edge-dev
#     Required reviewers: none (auto-deploys on merge)
#
#   core-uat / data-uat / compute-uat / workloads-uat / edge-uat
#     Required reviewers: 1 × <product-team>
#
#   core-prd / data-prd / compute-prd / workloads-prd / edge-prd
#     Required reviewers: 2 × (<product-team> + <platform-team>)
#
# No environment variables are needed — LocalStack requires only the repo secret.
#
# ── HOW APPROVAL WORKS ────────────────────────────────────────────────────────
# When the apply job starts, GitHub pauses and notifies the required reviewers.
# Reviewers see the PR plan comments (posted by plan.yml) before approving.
# Approving in GitHub Environments releases the job to continue.
#
# No secrets are required for the PoC — backend is local, no Azure credentials needed.

on:
  push:
    branches: [main]

permissions:
  contents: write   # for GitHub Release tag

jobs:
  # ── DEV ─────────────────────────────────────────────────────────────────────
  core-dev:
    name: Apply / core / dev
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: core
      environment: dev
      working_directory: core
    secrets: inherit

  data-dev:
    name: Apply / data / dev
    needs: core-dev
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: data
      environment: dev
      working_directory: data
    secrets: inherit

  compute-dev:
    name: Apply / compute / dev
    needs: data-dev
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: compute
      environment: dev
      working_directory: compute
    secrets: inherit

  workloads-dev:
    name: Apply / workloads / dev
    needs: compute-dev
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: workloads
      environment: dev
      working_directory: workloads
    secrets: inherit

  edge-dev:
    name: Apply / edge / dev
    needs: compute-dev   # peer-optional with workloads
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: edge
      environment: dev
      working_directory: edge
    secrets: inherit

  # ── UAT ─────────────────────────────────────────────────────────────────────
  core-uat:
    name: Apply / core / uat
    needs: [workloads-dev, edge-dev]
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: core
      environment: uat
      working_directory: core
    secrets: inherit

  data-uat:
    name: Apply / data / uat
    needs: core-uat
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: data
      environment: uat
      working_directory: data
    secrets: inherit

  compute-uat:
    name: Apply / compute / uat
    needs: data-uat
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: compute
      environment: uat
      working_directory: compute
    secrets: inherit

  workloads-uat:
    name: Apply / workloads / uat
    needs: compute-uat
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: workloads
      environment: uat
      working_directory: workloads
    secrets: inherit

  edge-uat:
    name: Apply / edge / uat
    needs: compute-uat
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: edge
      environment: uat
      working_directory: edge
    secrets: inherit

  # ── PRD ─────────────────────────────────────────────────────────────────────
  core-prd:
    name: Apply / core / prd
    needs: [workloads-uat, edge-uat]
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: core
      environment: prd
      working_directory: core
    secrets: inherit

  data-prd:
    name: Apply / data / prd
    needs: core-prd
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: data
      environment: prd
      working_directory: data
    secrets: inherit

  compute-prd:
    name: Apply / compute / prd
    needs: data-prd
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: compute
      environment: prd
      working_directory: compute
    secrets: inherit

  workloads-prd:
    name: Apply / workloads / prd
    needs: compute-prd
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: workloads
      environment: prd
      working_directory: workloads
    secrets: inherit

  edge-prd:
    name: Apply / edge / prd
    needs: compute-prd
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: edge
      environment: prd
      working_directory: edge
    secrets: inherit
