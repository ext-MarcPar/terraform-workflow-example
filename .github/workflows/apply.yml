name: Terraform Apply

# Runs on push to main (i.e., after a PR is merged). Applies all 5 layers
# sequentially through dev → uat → prd, gating each environment with
# GitHub Environment required reviewers.
#
# ── GITHUB ENVIRONMENTS REQUIRED ─────────────────────────────────────────────
# Create these environments in repo Settings → Environments:
#
#   core-dev / data-dev / compute-dev / workloads-dev / edge-dev
#     Required reviewers: none (auto-deploys on merge)
#
#   core-uat / data-uat / compute-uat / workloads-uat / edge-uat
#     Required reviewers: 1 × <product-team>
#
#   core-prd / data-prd / compute-prd / workloads-prd / edge-prd
#     Required reviewers: 2 × (<product-team> + <platform-team>)
#
# Each environment must have these variables:
#   AZURE_CLIENT_ID_APPLY   Apply SP client ID for this env
#   AZURE_SUBSCRIPTION_ID   Product subscription ID for this env
#
# ── HOW APPROVAL WORKS ────────────────────────────────────────────────────────
# When the apply job starts, GitHub pauses and notifies the required reviewers.
# Reviewers see the PR plan comments (posted by plan.yml) before approving.
# Approving in GitHub Environments is the human gate that releases the OIDC
# token exchange for the Apply SP.

on:
  push:
    branches: [main]

permissions:
  contents: write   # for CHANGELOG commit and GitHub Release tag
  id-token: write   # OIDC token for Azure login
  pull-requests: read

jobs:
  # ── DEV ─────────────────────────────────────────────────────────────────────
  core-dev:
    name: Apply / core / dev
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: core
      environment: dev
      working_directory: core
      state_resource_group: ${{ vars.TF_STATE_RESOURCE_GROUP }}
      state_storage_account: ${{ vars.TF_STATE_STORAGE_ACCOUNT }}
      state_container: ${{ vars.TF_STATE_CONTAINER }}
      state_key: ${{ vars.BU_CODE }}/${{ vars.PRODUCT_NAME }}/core/terraform.tfstate
    secrets:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID_APPLY }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

  data-dev:
    name: Apply / data / dev
    needs: core-dev
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: data
      environment: dev
      working_directory: data
      state_resource_group: ${{ vars.TF_STATE_RESOURCE_GROUP }}
      state_storage_account: ${{ vars.TF_STATE_STORAGE_ACCOUNT }}
      state_container: ${{ vars.TF_STATE_CONTAINER }}
      state_key: ${{ vars.BU_CODE }}/${{ vars.PRODUCT_NAME }}/data/terraform.tfstate
    secrets:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID_APPLY }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

  compute-dev:
    name: Apply / compute / dev
    needs: data-dev
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: compute
      environment: dev
      working_directory: compute
      state_resource_group: ${{ vars.TF_STATE_RESOURCE_GROUP }}
      state_storage_account: ${{ vars.TF_STATE_STORAGE_ACCOUNT }}
      state_container: ${{ vars.TF_STATE_CONTAINER }}
      state_key: ${{ vars.BU_CODE }}/${{ vars.PRODUCT_NAME }}/compute/terraform.tfstate
    secrets:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID_APPLY }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

  workloads-dev:
    name: Apply / workloads / dev
    needs: compute-dev
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: workloads
      environment: dev
      working_directory: workloads
      state_resource_group: ${{ vars.TF_STATE_RESOURCE_GROUP }}
      state_storage_account: ${{ vars.TF_STATE_STORAGE_ACCOUNT }}
      state_container: ${{ vars.TF_STATE_CONTAINER }}
      state_key: ${{ vars.BU_CODE }}/${{ vars.PRODUCT_NAME }}/workloads/terraform.tfstate
    secrets:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID_APPLY }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

  edge-dev:
    name: Apply / edge / dev
    needs: compute-dev   # peer-optional with workloads
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: edge
      environment: dev
      working_directory: edge
      state_resource_group: ${{ vars.TF_STATE_RESOURCE_GROUP }}
      state_storage_account: ${{ vars.TF_STATE_STORAGE_ACCOUNT }}
      state_container: ${{ vars.TF_STATE_CONTAINER }}
      state_key: ${{ vars.BU_CODE }}/${{ vars.PRODUCT_NAME }}/edge/terraform.tfstate
    secrets:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID_APPLY }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

  # ── UAT ─────────────────────────────────────────────────────────────────────
  core-uat:
    name: Apply / core / uat
    needs: [workloads-dev, edge-dev]
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: core
      environment: uat
      working_directory: core
      state_resource_group: ${{ vars.TF_STATE_RESOURCE_GROUP }}
      state_storage_account: ${{ vars.TF_STATE_STORAGE_ACCOUNT }}
      state_container: ${{ vars.TF_STATE_CONTAINER }}
      state_key: ${{ vars.BU_CODE }}/${{ vars.PRODUCT_NAME }}/core/terraform.tfstate
    secrets:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID_APPLY }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

  data-uat:
    name: Apply / data / uat
    needs: core-uat
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: data
      environment: uat
      working_directory: data
      state_resource_group: ${{ vars.TF_STATE_RESOURCE_GROUP }}
      state_storage_account: ${{ vars.TF_STATE_STORAGE_ACCOUNT }}
      state_container: ${{ vars.TF_STATE_CONTAINER }}
      state_key: ${{ vars.BU_CODE }}/${{ vars.PRODUCT_NAME }}/data/terraform.tfstate
    secrets:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID_APPLY }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

  compute-uat:
    name: Apply / compute / uat
    needs: data-uat
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: compute
      environment: uat
      working_directory: compute
      state_resource_group: ${{ vars.TF_STATE_RESOURCE_GROUP }}
      state_storage_account: ${{ vars.TF_STATE_STORAGE_ACCOUNT }}
      state_container: ${{ vars.TF_STATE_CONTAINER }}
      state_key: ${{ vars.BU_CODE }}/${{ vars.PRODUCT_NAME }}/compute/terraform.tfstate
    secrets:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID_APPLY }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

  workloads-uat:
    name: Apply / workloads / uat
    needs: compute-uat
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: workloads
      environment: uat
      working_directory: workloads
      state_resource_group: ${{ vars.TF_STATE_RESOURCE_GROUP }}
      state_storage_account: ${{ vars.TF_STATE_STORAGE_ACCOUNT }}
      state_container: ${{ vars.TF_STATE_CONTAINER }}
      state_key: ${{ vars.BU_CODE }}/${{ vars.PRODUCT_NAME }}/workloads/terraform.tfstate
    secrets:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID_APPLY }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

  edge-uat:
    name: Apply / edge / uat
    needs: compute-uat
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: edge
      environment: uat
      working_directory: edge
      state_resource_group: ${{ vars.TF_STATE_RESOURCE_GROUP }}
      state_storage_account: ${{ vars.TF_STATE_STORAGE_ACCOUNT }}
      state_container: ${{ vars.TF_STATE_CONTAINER }}
      state_key: ${{ vars.BU_CODE }}/${{ vars.PRODUCT_NAME }}/edge/terraform.tfstate
    secrets:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID_APPLY }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

  # ── PRD ─────────────────────────────────────────────────────────────────────
  core-prd:
    name: Apply / core / prd
    needs: [workloads-uat, edge-uat]
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: core
      environment: prd
      working_directory: core
      state_resource_group: ${{ vars.TF_STATE_RESOURCE_GROUP }}
      state_storage_account: ${{ vars.TF_STATE_STORAGE_ACCOUNT }}
      state_container: ${{ vars.TF_STATE_CONTAINER }}
      state_key: ${{ vars.BU_CODE }}/${{ vars.PRODUCT_NAME }}/core/terraform.tfstate
    secrets:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID_APPLY }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

  data-prd:
    name: Apply / data / prd
    needs: core-prd
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: data
      environment: prd
      working_directory: data
      state_resource_group: ${{ vars.TF_STATE_RESOURCE_GROUP }}
      state_storage_account: ${{ vars.TF_STATE_STORAGE_ACCOUNT }}
      state_container: ${{ vars.TF_STATE_CONTAINER }}
      state_key: ${{ vars.BU_CODE }}/${{ vars.PRODUCT_NAME }}/data/terraform.tfstate
    secrets:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID_APPLY }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

  compute-prd:
    name: Apply / compute / prd
    needs: data-prd
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: compute
      environment: prd
      working_directory: compute
      state_resource_group: ${{ vars.TF_STATE_RESOURCE_GROUP }}
      state_storage_account: ${{ vars.TF_STATE_STORAGE_ACCOUNT }}
      state_container: ${{ vars.TF_STATE_CONTAINER }}
      state_key: ${{ vars.BU_CODE }}/${{ vars.PRODUCT_NAME }}/compute/terraform.tfstate
    secrets:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID_APPLY }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

  workloads-prd:
    name: Apply / workloads / prd
    needs: compute-prd
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
      tier: workloads
      environment: prd
      working_directory: workloads
      state_resource_group: ${{ vars.TF_STATE_RESOURCE_GROUP }}
      state_storage_account: ${{ vars.TF_STATE_STORAGE_ACCOUNT }}
      state_container: ${{ vars.TF_STATE_CONTAINER }}
      state_key: ${{ vars.BU_CODE }}/${{ vars.PRODUCT_NAME }}/workloads/terraform.tfstate
    secrets:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID_APPLY }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

  edge-prd:
    name: Apply / edge / prd
    needs: compute-prd
    uses: ./.github/workflows/reusable-az-terraform.yml
    with:
