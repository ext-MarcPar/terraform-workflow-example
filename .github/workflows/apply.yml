name: Terraform Apply

# Runs on push to main (i.e., after a PR is merged). Applies all 5 layers
# sequentially through dev → uat → prd, gating each environment with
# GitHub Environment required reviewers.
#
# ── GITHUB ENVIRONMENTS REQUIRED ─────────────────────────────────────────────
# Create these environments in repo Settings → Environments:
#
#   core-dev / data-dev / compute-dev / workloads-dev / edge-dev
#     Required reviewers: none (auto-deploys on merge)
#
#   core-uat / data-uat / compute-uat / workloads-uat / edge-uat
#     Required reviewers: 1 × <product-team>
#
#   core-prd / data-prd / compute-prd / workloads-prd / edge-prd
#     Required reviewers: 2 × (<product-team> + <platform-team>)
#
# No environment variables are needed — LocalStack requires only the repo secret.
#
# ── HOW APPROVAL WORKS ────────────────────────────────────────────────────────
# When the apply job starts, GitHub pauses and notifies the required reviewers.
# Reviewers see the PR plan comments (posted by plan.yml) before approving.
# Approving in GitHub Environments releases the job to continue.
#
# No secrets are required for the PoC — backend is local, no Azure credentials needed.

on:
  push:
    branches: [main]

permissions:
  contents: write   # for GitHub Release tag

jobs:
  # ── DEV ─────────────────────────────────────────────────────────────────────
  core-dev:
    name: Apply / core / dev
    uses: ext-MarcPar/example-centralize-workflow/.github/workflows/reusable-az-terraform.yml@df49ced80a0e7245a21d068a1347ee5495862742
    with:
      tier: core
      environment: dev
      working_directory: core
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_APPLY }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  data-dev:
    name: Apply / data / dev
    needs: core-dev
    uses: ext-MarcPar/example-centralize-workflow/.github/workflows/reusable-az-terraform.yml@df49ced80a0e7245a21d068a1347ee5495862742
    with:
      tier: data
      environment: dev
      working_directory: data
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_APPLY }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  compute-dev:
    name: Apply / compute / dev
    needs: data-dev
    uses: ext-MarcPar/example-centralize-workflow/.github/workflows/reusable-az-terraform.yml@df49ced80a0e7245a21d068a1347ee5495862742
    with:
      tier: compute
      environment: dev
      working_directory: compute
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_APPLY }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  workloads-dev:
    name: Apply / workloads / dev
    needs: compute-dev
    uses: ext-MarcPar/example-centralize-workflow/.github/workflows/reusable-az-terraform.yml@df49ced80a0e7245a21d068a1347ee5495862742
    with:
      tier: workloads
      environment: dev
      working_directory: workloads
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_APPLY }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  edge-dev:
    name: Apply / edge / dev
    needs: compute-dev   # peer-optional with workloads
    uses: ext-MarcPar/example-centralize-workflow/.github/workflows/reusable-az-terraform.yml@df49ced80a0e7245a21d068a1347ee5495862742
    with:
      tier: edge
      environment: dev
      working_directory: edge
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_APPLY }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # ── UAT ─────────────────────────────────────────────────────────────────────
  core-uat:
    name: Apply / core / uat
    needs: [workloads-dev, edge-dev]
    uses: ext-MarcPar/example-centralize-workflow/.github/workflows/reusable-az-terraform.yml@df49ced80a0e7245a21d068a1347ee5495862742
    with:
      tier: core
      environment: uat
      working_directory: core
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_APPLY }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  data-uat:
    name: Apply / data / uat
    needs: core-uat
    uses: ext-MarcPar/example-centralize-workflow/.github/workflows/reusable-az-terraform.yml@df49ced80a0e7245a21d068a1347ee5495862742
    with:
      tier: data
      environment: uat
      working_directory: data
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_APPLY }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  compute-uat:
    name: Apply / compute / uat
    needs: data-uat
    uses: ext-MarcPar/example-centralize-workflow/.github/workflows/reusable-az-terraform.yml@df49ced80a0e7245a21d068a1347ee5495862742
    with:
      tier: compute
      environment: uat
      working_directory: compute
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_APPLY }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  workloads-uat:
    name: Apply / workloads / uat
    needs: compute-uat
    uses: ext-MarcPar/example-centralize-workflow/.github/workflows/reusable-az-terraform.yml@df49ced80a0e7245a21d068a1347ee5495862742
    with:
      tier: workloads
      environment: uat
      working_directory: workloads
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_APPLY }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  edge-uat:
    name: Apply / edge / uat
    needs: compute-uat
    uses: ext-MarcPar/example-centralize-workflow/.github/workflows/reusable-az-terraform.yml@df49ced80a0e7245a21d068a1347ee5495862742
    with:
      tier: edge
      environment: uat
      working_directory: edge
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_APPLY }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # ── PRD ─────────────────────────────────────────────────────────────────────
  core-prd:
    name: Apply / core / prd
    needs: [workloads-uat, edge-uat]
    uses: ext-MarcPar/example-centralize-workflow/.github/workflows/reusable-az-terraform.yml@df49ced80a0e7245a21d068a1347ee5495862742
    with:
      tier: core
      environment: prd
      working_directory: core
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_APPLY }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  data-prd:
    name: Apply / data / prd
    needs: core-prd
    uses: ext-MarcPar/example-centralize-workflow/.github/workflows/reusable-az-terraform.yml@df49ced80a0e7245a21d068a1347ee5495862742
    with:
      tier: data
      environment: prd
      working_directory: data
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_APPLY }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  compute-prd:
    name: Apply / compute / prd
    needs: data-prd
    uses: ext-MarcPar/example-centralize-workflow/.github/workflows/reusable-az-terraform.yml@df49ced80a0e7245a21d068a1347ee5495862742
    with:
      tier: compute
      environment: prd
      working_directory: compute
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_APPLY }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  workloads-prd:
    name: Apply / workloads / prd
    needs: compute-prd
    uses: ext-MarcPar/example-centralize-workflow/.github/workflows/reusable-az-terraform.yml@df49ced80a0e7245a21d068a1347ee5495862742
    with:
      tier: workloads
      environment: prd
      working_directory: workloads
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_APPLY }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  edge-prd:
    name: Apply / edge / prd
    needs: compute-prd
    uses: ext-MarcPar/example-centralize-workflow/.github/workflows/reusable-az-terraform.yml@df49ced80a0e7245a21d068a1347ee5495862742
    with:
      tier: edge
      environment: prd
      working_directory: edge
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_APPLY }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
